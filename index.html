<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNKS - Strength Beyond Limits</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background: linear-gradient(to bottom, #0a0a0a, #1c1c1c);
    color:white;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;

    background:
        linear-gradient(rgba(0,0,0,.5), rgba(0,0,0,.7)),
        url('Unks.jfif');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

.hero h1{
    font-size:5rem;
    color:silver;
    text-shadow:0 0 20px silver;
}

.hero p{
    font-size:1.3rem;
    margin-top:20px;
    color:#ddd;
}

/* BUTTON */
.btn{
    margin-top:30px;
    padding:15px 35px;
    background:#ffd700;
    color:black;
    border:none;
    border-radius:30px;
    font-weight:bold;
    cursor:pointer;
}

/* SECTION */
.section{
    padding:80px 10%;
}

.section-title{
    text-align:center;
    font-size:3rem;
    color:silver;
    margin-bottom:40px;
}

/* CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card-link{
    text-decoration:none;
    color:white;
}

.card{
    background:#141414;
    border:1px solid #333;
    border-radius:15px;
    padding:30px;
    text-align:center;
    transition:.3s;
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 0 20px rgba(255,215,0,.4);
}

.card h3{
    color:#ffd700;
}

/* QUOTE */
.quote{
    text-align:center;
    padding:100px 20px;
    background:black;
}

.quote h2{
    color:silver;
    font-size:2rem;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    background:#111;
    color:#aaa;
}
</style>
</head>

<body>

<section class="hero">
    <h1>UNKS</h1>
    <p>TAP IN TO SEE WHO UNKS TRULY IS</p>

    <button class="btn" onclick="location.href='strength.html'">
        ENTER HIS LIFESTYLE
    </button>
</section>

<section class="section">
    <h2 class="section-title">The Unks Code</h2>

    <div class="cards">

        <a href="cosmic.html" class="card-link">
            <div class="card">
                <h3>🌌 Cosmic Mindset</h3>
                <p>Tap to enter</p>
            </div>
        </a>

        <a href="discipline.html" class="card-link">
            <div class="card">
                <h3>🦇 Dark Knight Discipline</h3>
                <p>Tap to enter</p>
            </div>
        </a>

        <a href="strength.html" class="card-link">
            <div class="card">
                <h3>🏋️ Strength Training</h3>
                <p>Tap to enter</p>
            </div>
        </a>

    </div>
</section>

<section class="quote">
    <h2>"Strength isn't given. It's earned every rep, every set, every day."</h2>
</section>

<footer>
    © 2026 UNKS
</footer>

</body>
</html>
